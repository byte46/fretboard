<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Интерактивный гриф гитары</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        #fretboard {
            display: block;
        }
        .controls {
            padding: 10px;
            box-sizing: border-box;
            font-size: 16pt;
            max-width: 800px;
            margin: 0 auto;
            margin: 20px;
            font-family: Arial;
        }

        .control-label {
            display: inline-block;
            width: 120px;
            vertical-align: middle;
        }

        .controls select {
            font-size: 16px;
            padding: 5px;
        }

        .fret-line { stroke: #666; }
        .string-line { stroke: #CCC; stroke-width: 2; }
        .open-fret { fill: #FFE4B5; }
        .fret-white { fill: #FFFFFF; }
        .note-tonic { fill: #32CD32; }
        .note-scale { fill: #1E7070; }
        .note-other { fill: #C0C0C0; }

        .note-circle { cursor: pointer; }
        .control-group { margin: 10px 0; }
        .fret-markers circle { fill: #666; }
        .string_name {
            text-anchor: end;
            fill: #666;
            font-family: 'Arial';
            font-size: 10px;
            font-weight: bold;
            pointer-events: none;
            user-select: none;
            -webkit-user-select: none;
        }

        #scaleNotesList {
            color: #333;
            font-size: 16pt;
            padding: 8px;
            background: #f5f5f5;
            border-radius: 4px;
            width: fit-content;
            margin: 0 20px 20px 20px;
        }

        .copyright {
            color: #E0E0E0;
        }

        .container {
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
            padding: 20px;
        }

        .fretboard-container {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            margin-right: 30px;
        }

        #piano {
            display: block;
            margin-top: 20px;
        }

        /* На мобильных устройствах */
        @media (max-width: 768px) {
            .container {
                align-items: center;
            }

            .fretboard-container {
                margin-right: 0;
            }

            #scaleNotesList {
                margin: 0 0 10px 0;
            }
        }

        .piano-key-white {
            fill: #FFFFFF;
            stroke: #000000;
            stroke-width: 1;
            cursor: pointer;
        }

        .piano-key-black {
            fill: #000000;
            stroke: #333333;
            stroke-width: 1;
            cursor: pointer;
        }

        .piano-circle-tonic {
            fill: #32CD32;
        }

        .piano-circle-scale {
            fill: #1E7070;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="fretboard-container">
            <svg id="fretboard" xmlns="http://www.w3.org/2000/svg" width="600" height="220" viewBox="0 0 400 160"></svg>
            <svg id="piano" xmlns="http://www.w3.org/2000/svg" width="600" height="220"></svg>
        </div>
    </div>
    <div id="scaleNotesList"></div>
    <div class="controls">
        <div class="control-group">
            <span class="control-label">Тоника:</span>
            <select id="tonicSelect"></select>
        </div>
        <div class="control-group">
            <span class="control-label">Тип:</span>
            <select id="scaleTypeSelect">
                <option value="major">Мажор (ионийский)</option>
                <option value="minor">Минор (эолийский)</option>
                <option value="dorian">Дорийский</option>
                <option value="phrygian">Фригийский</option>
                <option value="lydian">Лидийский</option>
                <option value="mixolydian">Миксолидийский</option>
                <option value="locrian">Локрийский</option>
                <option value="harm_minor">Гармонический минор</option>
                <option value="penta_maj">Пентатоника мажорная</option>
                <option value="penta_min">Пентатоника минорная</option>
            </select>
        </div>
    </div>

    <script>
        (function() {
            const FRET_WIDTH = 30;
            const FRETBOARD_HEIGHT = 140;
            const STRING_SPACING = 20;
            const NECK_START = 15;
            const NUM_FRETS = 12;
            const NUM_STRINGS = 6;
            const PIANO_GAP = 30; // Отступ от грифа до фортепиано

            // Параметры фортепиано - размеры как у грифа (width="600", height="220")
            const PIANO_TOTAL_WIDTH = 600;
            const PIANO_KEY_WIDTH = 40; // 14 белых клавиш * 40 = 560 + отступы
            const PIANO_KEY_HEIGHT = 180; // Высота белых клавиш
            const PIANO_BLACK_KEY_WIDTH = 24; // 40 * 0.6
            const PIANO_BLACK_KEY_HEIGHT = 108; // 180 * 0.6
            const PIANO_START_X = 10;
            const PIANO_START_Y = 10;
            const PIANO_CIRCLE_RADIUS = 9;
            const PIANO_CIRCLE_Y_OFFSET = 15; // Отступ от низа клавиши

            const noteOrder = ['A','A#','B','C','C#','D','D#','E','F','F#','G','G#'];
            const tonicOptions = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
            const romanNumerals = ['', 'I', 'II', 'III', 'IV', 'V', 'VI', 'VII'];
            const svg = document.getElementById('fretboard');
            const pianoSvg = document.getElementById('piano');


            const strings = [
                { number: 1, openNote: 'E', openIndex: 7 },
                { number: 2, openNote: 'A', openIndex: 0 },
                { number: 3, openNote: 'D', openIndex: 5 },
                { number: 4, openNote: 'G', openIndex: 10 },
                { number: 5, openNote: 'B', openIndex: 2 },
                { number: 6, openNote: 'E', openIndex: 7 }
            ];

            const notes = [];
            strings.forEach(string => {
                for (let fret = 0; fret <= NUM_FRETS; fret++) {
                    const noteIndex = (string.openIndex + fret) % 12;
                    notes.push({
                        note: noteOrder[noteIndex],
                        x: fret * FRET_WIDTH + NECK_START,
                        y: FRETBOARD_HEIGHT - (string.number * STRING_SPACING),
                        fret: fret,
                        string: string.number
                    });
                }
            });

            let currentTonic = 'C';
            let scaleType = 'major';

            function saveState() {
                localStorage.setItem('guitarFretTonic', currentTonic);
                localStorage.setItem('guitarFretScaleType', scaleType);
            }

            function loadState() {
                const savedTonic = localStorage.getItem('guitarFretTonic');
                const savedScaleType = localStorage.getItem('guitarFretScaleType');
                if (savedTonic) currentTonic = savedTonic;
                if (savedScaleType) scaleType = savedScaleType;
            }

            const scaleFormulas = { // Первый элемент — 2 ступень
                major:      [2, 2, 1, 2, 2, 2, 1],      // Ионийский
                minor:      [2, 1, 2, 2, 1, 2, 2],      // Эолийский
                harm_minor: [2, 1, 2, 2, 1, 3, 1],
                penta_maj:  [2, 2, 3, 2, 3],
                penta_min:  [3, 2, 2, 3, 2],
                dorian:     [2, 1, 2, 2, 2, 1, 2],      // Дорийский
                phrygian:   [1, 2, 2, 2, 1, 2, 2],      // Фригийский
                lydian:     [2, 2, 2, 1, 2, 2, 1],      // Лидийский
                mixolydian: [2, 2, 1, 2, 2, 1, 2],      // Миксолидийский
                locrian:    [1, 2, 2, 1, 2, 2, 2]       // Локрийский
            };


            function initUI() {
                // Загрузка сохранённого состояния
                loadState();

                tonicOptions.forEach(note => {
                    const option = new Option(note, note);
                    tonicSelect.add(option);
                });

                // Установка сохранённых значений в select
                tonicSelect.value = currentTonic;
                document.getElementById('scaleTypeSelect').value = scaleType;

                // Обработчики событий
                tonicSelect.addEventListener('change', () => {
                    currentTonic = tonicSelect.value;
                    saveState();
                    drawFretboard();
                });

                document.getElementById('scaleTypeSelect').addEventListener('change', e => {
                    scaleType = e.target.value;
                    saveState();
                    drawFretboard();
                });

                svg.addEventListener('click', e => {
                    if (e.target.classList.contains('note-circle')) {
                        const note = notes.find(n =>
                            n.x === +e.target.getAttribute('cx') &&
                            n.y === +e.target.getAttribute('cy')
                        );
                        if (note) {
                            currentTonic = note.note;
                            saveState();
                            drawFretboard();
                        }
                    }
                });
            }

            function getScaleNotes(tonic, type) {
                const startIndex = noteOrder.indexOf(tonic);
                const formula = scaleFormulas[type];
                const scale = [tonic];
                let current = startIndex;
                for (const step of formula) {
                    current = (current + step) % 12;
                    scale.push(noteOrder[current]);
                }
                return scale;
            }

            function createScaleLookup(scaleNotes) {
                const lookup = {};
                scaleNotes.forEach((note, index) => {
                    // Если нота уже есть (дубликат тоники в конце), пропускаем
                    if (!(note in lookup)) {
                        lookup[note] = index + 1;
                    }
                });
                return lookup;
            }

            function drawFretboard() {
                tonicSelect.value = currentTonic;
                const svg = document.getElementById('fretboard');
                svg.innerHTML = '';

                svg.appendChild(createRect(0, 0, NECK_START, FRETBOARD_HEIGHT, 'open-fret'));
                svg.appendChild(createRect(NECK_START, 0, NUM_FRETS * FRET_WIDTH, FRETBOARD_HEIGHT, 'fret-white'));

                for (let i = 0; i <= NUM_FRETS; i++) {
                    svg.appendChild(createLine(i * FRET_WIDTH, 0, i * FRET_WIDTH, FRETBOARD_HEIGHT, 'fret-line'));
                }
                // Горизонтальные линии струн
                for (let i = 1; i <= NUM_STRINGS; i++) {
                    const y = FRETBOARD_HEIGHT - (i * STRING_SPACING);
                    svg.appendChild(createLine(0, y, 390, y, 'string-line'));
                }

                // Добавление обозначений струн слева
                strings.forEach(string => {
                    const text = createText(-5, FRETBOARD_HEIGHT - (string.number * STRING_SPACING) + 4, string.openNote);
                    text.classList.add('string_name');
                    svg.appendChild(text);
                });

                // Ноты
                const scaleNotes = getScaleNotes(currentTonic, scaleType);
                const scaleLookup = createScaleLookup(scaleNotes);

                notes.forEach(n => {
                    const degree = scaleLookup[n.note];
                    const isTonic = n.note === currentTonic;
                    const isScaleNote = !!degree;

                    const circle = createCircle(n.x, n.y, 9, [
                        'note-circle',
                        isTonic ? 'note-tonic' :
                        isScaleNote ? 'note-scale' : 'note-other'
                    ]);
                    svg.appendChild(circle);

                    const text = createText(n.x, n.y + 4, romanNumerals[degree] || '');
                    text.setAttribute('fill', 'white');
                    text.setAttribute('text-anchor', 'middle');
                    text.setAttribute('font-family', 'Arial');
                    text.setAttribute('font-size', '10');
                    text.setAttribute('pointer-events', 'none');
                    svg.appendChild(text);
                });

                // Маркеры ладов
                const markers = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                markers.setAttribute('class', 'fret-markers');
                [3, 5, 7, 9].forEach(fret => markers.appendChild(createCircle(fret * FRET_WIDTH + NECK_START, 150, 2)));
                markers.appendChild(createCircle(12 * FRET_WIDTH + NECK_START, 147, 2));
                markers.appendChild(createCircle(12 * FRET_WIDTH + NECK_START, 153, 2));
                svg.appendChild(markers);

                scaleNotesList.innerHTML = `
                    <strong>Ноты последовательности:</strong>
                ${scaleNotes.join(', ')}
                `;

                // Обновляем фортепиано
                updatePiano();
            }

            // Конфигурация клавиш фортепиано (2 октавы, начиная с C)
            // true = белая клавиша, false = чёрная клавиша
            const pianoKeysConfig = [
                { note: 'C', isWhite: true },
                { note: 'C#', isWhite: false },
                { note: 'D', isWhite: true },
                { note: 'D#', isWhite: false },
                { note: 'E', isWhite: true },
                { note: 'F', isWhite: true },
                { note: 'F#', isWhite: false },
                { note: 'G', isWhite: true },
                { note: 'G#', isWhite: false },
                { note: 'A', isWhite: true },
                { note: 'A#', isWhite: false },
                { note: 'B', isWhite: true },
                // Вторая октава
                { note: 'C', isWhite: true },
                { note: 'C#', isWhite: false },
                { note: 'D', isWhite: true },
                { note: 'D#', isWhite: false },
                { note: 'E', isWhite: true },
                { note: 'F', isWhite: true },
                { note: 'F#', isWhite: false },
                { note: 'G', isWhite: true },
                { note: 'G#', isWhite: false },
                { note: 'A', isWhite: true },
                { note: 'A#', isWhite: false },
                { note: 'B', isWhite: true }
            ];

            function drawPiano() {
                const scaleNotes = getScaleNotes(currentTonic, scaleType);
                const scaleLookup = createScaleLookup(scaleNotes);

                pianoSvg.innerHTML = '';

                let whiteKeyIndex = 0;

                // Сначала рисуем белые клавиши
                pianoKeysConfig.forEach((key, index) => {
                    if (key.isWhite) {
                        const x = PIANO_START_X + whiteKeyIndex * PIANO_KEY_WIDTH;
                        const y = PIANO_START_Y;
                        const note = key.note;

                        const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                        rect.setAttribute('x', x);
                        rect.setAttribute('y', y);
                        rect.setAttribute('width', PIANO_KEY_WIDTH);
                        rect.setAttribute('height', PIANO_KEY_HEIGHT);
                        rect.classList.add('piano-key-white');

                        rect.setAttribute('data-note', note);
                        rect.addEventListener('click', () => {
                            currentTonic = note;
                            saveState();
                            drawFretboard();
                            drawPiano();
                        });

                        pianoSvg.appendChild(rect);

                        whiteKeyIndex++;
                    }
                });

                // Затем рисуем чёрные клавиши поверх белых
                whiteKeyIndex = 0;
                pianoKeysConfig.forEach((key, index) => {
                    if (key.isWhite) {
                        whiteKeyIndex++;
                    } else {
                        // Чёрная клавиша находится между текущей и следующей белой
                        const x = PIANO_START_X + whiteKeyIndex * PIANO_KEY_WIDTH - PIANO_BLACK_KEY_WIDTH / 2;
                        const y = PIANO_START_Y;
                        const note = key.note;

                        const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                        rect.setAttribute('x', x);
                        rect.setAttribute('y', y);
                        rect.setAttribute('width', PIANO_BLACK_KEY_WIDTH);
                        rect.setAttribute('height', PIANO_BLACK_KEY_HEIGHT);
                        rect.classList.add('piano-key-black');

                        rect.setAttribute('data-note', note);
                        rect.addEventListener('click', () => {
                            currentTonic = note;
                            saveState();
                            drawFretboard();
                            drawPiano();
                        });

                        pianoSvg.appendChild(rect);
                    }
                });

                // Рисуем кружки для нот гаммы (только активные)
                whiteKeyIndex = 0;
                pianoKeysConfig.forEach((key, index) => {
                    if (key.isWhite) {
                        const note = key.note;
                        const degree = scaleLookup[note];
                        if (degree) {
                            const x = PIANO_START_X + whiteKeyIndex * PIANO_KEY_WIDTH + PIANO_KEY_WIDTH / 2;
                            const y = PIANO_START_Y + PIANO_KEY_HEIGHT - PIANO_CIRCLE_Y_OFFSET;
                            const isTonic = note === currentTonic;

                            const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                            circle.setAttribute('cx', x);
                            circle.setAttribute('cy', y);
                            circle.setAttribute('r', PIANO_CIRCLE_RADIUS);
                            circle.classList.add(isTonic ? 'piano-circle-tonic' : 'piano-circle-scale');
                            circle.setAttribute('pointer-events', 'none');

                            pianoSvg.appendChild(circle);

                            // Добавляем номер ступени на кружок
                            const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                            text.setAttribute('x', x);
                            text.setAttribute('y', y + 5);
                            text.setAttribute('text-anchor', 'middle');
                            text.setAttribute('fill', 'white');
                            text.setAttribute('font-family', 'Arial');
                            text.setAttribute('font-size', '12');
                            text.setAttribute('pointer-events', 'none');
                            text.textContent = romanNumerals[degree] || '';
                            pianoSvg.appendChild(text);
                        }
                        whiteKeyIndex++;
                    } else {
                        // Чёрные клавиши
                        const note = key.note;
                        const degree = scaleLookup[note];
                        if (degree) {
                            const x = PIANO_START_X + whiteKeyIndex * PIANO_KEY_WIDTH - PIANO_BLACK_KEY_WIDTH / 2 + PIANO_BLACK_KEY_WIDTH / 2;
                            const y = PIANO_START_Y + PIANO_BLACK_KEY_HEIGHT - PIANO_CIRCLE_Y_OFFSET;
                            const isTonic = note === currentTonic;

                            const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                            circle.setAttribute('cx', x);
                            circle.setAttribute('cy', y);
                            circle.setAttribute('r', PIANO_CIRCLE_RADIUS);
                            circle.classList.add(isTonic ? 'piano-circle-tonic' : 'piano-circle-scale');
                            circle.setAttribute('pointer-events', 'none');

                            pianoSvg.appendChild(circle);

                            // Добавляем номер ступени на кружок
                            const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                            text.setAttribute('x', x);
                            text.setAttribute('y', y + 5);
                            text.setAttribute('text-anchor', 'middle');
                            text.setAttribute('fill', 'white');
                            text.setAttribute('font-family', 'Arial');
                            text.setAttribute('font-size', '10');
                            text.setAttribute('pointer-events', 'none');
                            text.textContent = romanNumerals[degree] || '';
                            pianoSvg.appendChild(text);
                        }
                    }
                });
            }

            // Обновление фортепиано при изменении состояния
            function updatePiano() {
                drawPiano();
            }

            // Вспомогательные функции
            function createRect(x, y, w, h, cls) {
                const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                rect.setAttribute('x', x);
                rect.setAttribute('y', y);
                rect.setAttribute('width', w);
                rect.setAttribute('height', h);
                if (cls) rect.classList.add(cls);
                return rect;
            }

            function createLine(x1, y1, x2, y2, cls) {
                const line = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                line.setAttribute('d', `M${x1} ${y1}L${x2} ${y2}`);
                line.classList.add(cls);
                return line;
            }

            function createCircle(cx, cy, r, classes = []) {
                const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                circle.setAttribute('cx', cx);
                circle.setAttribute('cy', cy);
                circle.setAttribute('r', r);
                if (Array.isArray(classes)) classes.forEach(c => circle.classList.add(c));
                return circle;
            }

            function createText(x, y, text) {
                const elem = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                elem.setAttribute('x', x);
                elem.setAttribute('y', y);
                elem.classList.add('svg-text');
                elem.textContent = text;
                return elem;
            }
            initUI();
            drawFretboard();
            drawPiano();
        })();
    </script>
